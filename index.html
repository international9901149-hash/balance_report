<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>資產負債統計報表</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root {
    --ink: #1a2332; --ink-soft: #5a6577; --line: #e3e7ee; --bg: #fbfcfd; --card: #ffffff;
    --asset: #1f7a5c; --debt: #b0413e; --net: #1a3a6b; --ratio: #8a6d1f; --accent: #1a3a6b;
    --up: #1f7a5c; --down: #b0413e; --cash: #6a4fb3; --income: #1f7a5c; --expense: #b0413e; --balance: #8a6d1f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", sans-serif;
    background: var(--bg); color: var(--ink); line-height: 1.5; padding: 24px 16px 60px;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1200px; margin: 0 auto; }
  header { margin-bottom: 18px; display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
  h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.01em; }
  h1 small { font-size: 0.8rem; font-weight: 400; color: var(--ink-soft); }
  .back { margin-left: auto; font-size: 0.82rem; color: var(--accent); text-decoration: none; font-weight: 500;
    border: 1px solid var(--line); padding: 7px 13px; border-radius: 9px; background: #fff; cursor: pointer; }
  .back:hover { background: #f1f5fb; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--ink-soft); display: inline-block; }
  .dot.on { background: var(--asset); } .dot.err { background: var(--debt); }
  .statusline { font-size: 0.76rem; color: var(--ink-soft); margin-bottom: 20px; display: flex; align-items: center; gap: 7px; }

  .cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
  .mcard { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 15px; position: relative; overflow: hidden; }
  .mcard::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--accent); }
  .mcard.a::before { background: var(--asset); } .mcard.d::before { background: var(--debt); }
  .mcard.n::before { background: var(--net); } .mcard.r::before { background: var(--ratio); }
  .mcard .lbl { font-size: 0.74rem; color: var(--ink-soft); font-weight: 500; }
  .mcard .val { font-size: 1.3rem; font-weight: 700; margin-top: 5px; letter-spacing: -0.02em; }
  .mcard.a .val { color: var(--asset); } .mcard.d .val { color: var(--debt); }
  .mcard.n .val { color: var(--net); } .mcard.r .val { color: var(--ratio); }
  .mcard .delta { font-size: 0.72rem; margin-top: 3px; font-weight: 600; }
  .delta.up { color: var(--up); } .delta.down { color: var(--down); }

  .panel { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 18px; margin-bottom: 20px; }
  .panel h2 { font-size: 1rem; font-weight: 700; margin-bottom: 14px; }
  .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  @media (max-width: 820px) { .charts { grid-template-columns: 1fr; } .cards { grid-template-columns: repeat(2,1fr); } }
  .chart-box { position: relative; height: 300px; }

  .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 10px; border: 1px solid var(--line); }
  table { border-collapse: collapse; width: 100%; font-size: 0.82rem; white-space: nowrap; }
  thead th {
    position: sticky; top: 0; background: #f3f6fa; color: var(--ink); font-weight: 700;
    padding: 9px 12px; text-align: right; border-bottom: 2px solid var(--line); z-index: 2;
  }
  thead th.date-col { text-align: left; position: sticky; left: 0; z-index: 3; background: #eef2f7; }
  thead th.grp-asset { color: var(--asset); } thead th.grp-debt { color: var(--debt); } thead th.grp-cash { color: var(--cash); }
  tbody td { padding: 8px 12px; text-align: right; border-bottom: 1px solid #f1f3f7; font-variant-numeric: tabular-nums; }
  tbody td.date-col { text-align: left; font-weight: 600; position: sticky; left: 0; background: #fff; z-index: 1; }
  tbody tr:hover td { background: #f8fafc; }
  tbody tr:hover td.date-col { background: #eef3f9; }
  td.net { font-weight: 700; color: var(--net); }
  td.asset-tot { font-weight: 600; color: var(--asset); }
  td.debt-tot { font-weight: 600; color: var(--debt); }
  td.chg.up { color: var(--up); font-weight: 600; } td.chg.down { color: var(--down); font-weight: 600; }
  td.zero { color: #c2c8d2; }
  .group-sep { border-left: 2px solid var(--line); }
  .empty { padding: 40px; text-align: center; color: var(--ink-soft); }
  .legend-note { font-size: 0.72rem; color: var(--ink-soft); margin-top: 10px; }
  .toolbar { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .toolbar button { border: 1px solid var(--line); background: #fff; border-radius: 8px; padding: 7px 13px; font-size: 0.78rem; cursor: pointer; color: var(--ink); font-weight: 500; }
  .toolbar button:hover { background: #f1f5fb; }
  .rowbtn { border: 1px solid var(--line); background: #fff; border-radius: 6px; padding: 4px 10px;
    font-size: 0.72rem; cursor: pointer; margin-right: 4px; color: var(--ink); font-weight: 500; }
  .rowbtn:hover { background: #f1f5fb; }
  .rowbtn.del { color: var(--debt); }
  .rowbtn.del:hover { background: rgba(176,65,62,.1); border-color: var(--debt); }
  td.actions { white-space: nowrap; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>資產負債統計報表 <small>Monthly Report</small></h1>
    <button class="back" onclick="window.close()">✕ 關閉</button>
  </header>
  <div class="statusline"><span class="dot" id="dot"></span><span id="status">連線中…</span></div>

  <div class="cards" id="cards"></div>

  <div class="panel">
    <h2>趨勢圖</h2>
    <div class="charts">
      <div class="chart-box"><canvas id="trendChart"></canvas></div>
      <div class="chart-box"><canvas id="ratioChart"></canvas></div>
    </div>
    <div class="legend-note">左：非不動產資產（活期存款＋美股＋台股加總，實線區域）／不動產資產／活期存款／美股／台股走勢（虛線為個別項目）。右：本月收入（綠柱）／本月支出（紅柱）／結餘（金線）。</div>
  </div>

  <div class="panel">
    <h2>每月總表</h2>
    <div class="toolbar">
      <button id="copyTable">複製表格（可貼到 Excel）</button>
      <button id="csvBtn">下載 CSV</button>
    </div>
    <div class="table-scroll" id="tableWrap"><div class="empty">載入中…</div></div>
    <div class="legend-note">每列為一筆紀錄日期。每個資產／負債／現金流項目自成一欄；金額為 0 以淡色顯示。「淨資產變化」為與前一筆紀錄相比的增減；「結餘」為該筆紀錄的本月收入減本月支出。</div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCAOxO3oHSZFckRJRtMf-WqdhlOSAlTIRo",
  authDomain: "financial-position-a2f27.firebaseapp.com",
  projectId: "financial-position-a2f27",
  storageBucket: "financial-position-a2f27.firebasestorage.app",
  messagingSenderId: "600994047066",
  appId: "1:600994047066:web:e7c041ea86d825d26fa463"
};
const OWNER_ID = "jim";

// 「編輯」按鈕會導向此網址並帶上 ?loadId=文件ID。
// 若「個人資產負債表」主頁與本報表不在同一個資料夾／網域，請把下面改成主頁的完整網址。
const SHEET_URL = "balance-sheet.html";

const fmt = n => "NT$ " + Math.round(n).toLocaleString("en-US");
const num = n => Math.round(n).toLocaleString("en-US");
const $ = s => document.querySelector(s);
const fmtDate = s => { if(!s) return "（無日期）"; const [y,m,d]=s.split("-"); return `${y}/${parseInt(m)}/${parseInt(d)}`; };

function isProp(g){ return g.type === "property"; }
function propVal(it){ return (parseFloat(it.ping)||0)*(parseFloat(it.unit)||0)*10000+(parseFloat(it.parking)||0)*10000; }
function itemVal(it,g){ return isProp(g) ? propVal(it) : (parseFloat(it.amt)||0); }

// 從一筆 record.data 攤平成 { 欄位名: 金額 }，並回傳資產/負債/現金流欄位清單
function flatten(data){
  const out = { assetCols: [], debtCols: [], cashCols: [], values: {} };
  ["asset","debt"].forEach(side => {
    (data[side]||[]).forEach(g => {
      g.items.forEach(it => {
        const col = `${g.name}｜${it.name}`;
        out.values[col] = (out.values[col]||0) + itemVal(it,g);
        (side==="asset" ? out.assetCols : out.debtCols).push(col);
      });
    });
  });
  (data.cashflow||[]).forEach(g => {
    g.items.forEach(it => {
      const col = `${g.name}｜${it.name}`;
      out.values[col] = (out.values[col]||0) + (parseFloat(it.amt)||0);
      out.cashCols.push(col);
    });
  });
  return out;
}

let rows = []; // 每筆：{ id, date, netWorth, totalAsset, totalDebt, ratio, monthlyIncome, monthlyExpense, cashBalance, values:{} }
let assetCols = [], debtCols = [], cashCols = [];
let FS = null, DB = null;

async function init(){
  if(!firebaseConfig.apiKey){ setStatus("err","尚未設定 firebaseConfig"); return; }
  try{
    const [appMod, fsMod, authMod] = await Promise.all([
      import("https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js"),
      import("https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js"),
      import("https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js"),
    ]);
    const app = appMod.initializeApp(firebaseConfig);
    const db = fsMod.getFirestore(app);
    const auth = authMod.getAuth(app);
    await authMod.signInAnonymously(auth);
    authMod.onAuthStateChanged(auth, async u => {
      if(!u) return;
      setStatus("on","已連線，讀取資料中…");
      await fetchAll(fsMod, db);
    });
  }catch(e){ setStatus("err","連線失敗："+e.message); }
}

function setStatus(s,msg){ $("#dot").className = "dot "+(s==="on"?"on":s==="err"?"err":""); $("#status").textContent = msg; }

async function fetchAll(fs, db){
  FS = fs; DB = db;
  try{
    const col = fs.collection(db,"balanceSheets");
    const snap = await fs.getDocs(col);
    const raw = [];
    snap.forEach(d => { const x = d.data(); if((x.owner||"")===OWNER_ID) raw.push({ ...x, __id: d.id }); });
    if(!raw.length){ $("#tableWrap").innerHTML = '<div class="empty">尚無雲端紀錄，請先回主頁儲存幾筆資料。</div>'; setStatus("on","已連線（無資料）"); return; }

    // 收集所有出現過的欄位（保持首次出現順序）
    const aSet = [], dSet = [], cSet = [];
    raw.forEach(r => {
      const f = flatten(r.data||{});
      f.assetCols.forEach(c => { if(!aSet.includes(c)) aSet.push(c); });
      f.debtCols.forEach(c => { if(!dSet.includes(c)) dSet.push(c); });
      f.cashCols.forEach(c => { if(!cSet.includes(c)) cSet.push(c); });
    });
    assetCols = aSet; debtCols = dSet; cashCols = cSet;

    rows = raw.map(r => {
      const f = flatten(r.data||{});
      const a = r.totalAsset != null ? r.totalAsset : assetCols.reduce((s,c)=>s+(f.values[c]||0),0);
      const d = r.totalDebt  != null ? r.totalDebt  : debtCols.reduce((s,c)=>s+(f.values[c]||0),0);
      const expense = r.monthlyExpense != null ? r.monthlyExpense : cashCols.reduce((s,c)=>s+(f.values[c]||0),0);
      const income = r.monthlyIncome != null ? r.monthlyIncome : (parseFloat((r.data||{}).income)||0);
      return {
        id: r.__id,
        date: r.recordDate || (r.savedAt? r.savedAt.slice(0,10) : ""),
        netWorth: r.netWorth != null ? r.netWorth : a-d,
        totalAsset: a, totalDebt: d,
        ratio: r.ratio != null ? r.ratio : (a>0? d/a : 0),
        monthlyIncome: income, monthlyExpense: expense,
        cashBalance: r.cashBalance != null ? r.cashBalance : income - expense,
        values: f.values
      };
    }).sort((x,y) => (x.date||"").localeCompare(y.date||"")); // 由舊到新

    setStatus("on", `已連線，共 ${rows.length} 筆紀錄`);
    renderCards(); renderTable(); renderCharts();
  }catch(e){
    $("#tableWrap").innerHTML = `<div class="empty" style="color:var(--debt)">讀取失敗：${e.code||e.message}</div>`;
    setStatus("err","讀取失敗："+(e.code||e.message));
  }
}

function renderCards(){
  const last = rows[rows.length-1], prev = rows.length>1 ? rows[rows.length-2] : null;
  const dNet = prev ? last.netWorth - prev.netWorth : null;
  const dAsset = prev ? last.totalAsset - prev.totalAsset : null;
  const deltaHtml = v => v==null ? "" :
    `<div class="delta ${v>=0?"up":"down"}">${v>=0?"▲":"▼"} ${num(Math.abs(v))}（較前次）</div>`;
  $("#cards").innerHTML = `
    <div class="mcard n"><div class="lbl">最新淨資產（${fmtDate(last.date)}）</div><div class="val">${fmt(last.netWorth)}</div>${deltaHtml(dNet)}</div>
    <div class="mcard r"><div class="lbl">最新負債比率</div><div class="val">${(last.ratio*100).toFixed(1)}%</div></div>
    <div class="mcard a"><div class="lbl">最新總資產</div><div class="val">${fmt(last.totalAsset)}</div>${deltaHtml(dAsset)}</div>
    <div class="mcard d"><div class="lbl">最新總負債</div><div class="val">${fmt(last.totalDebt)}</div></div>`;
}

function renderTable(){
  let h = "<table><thead><tr>";
  h += '<th class="date-col">日期</th>';
  h += '<th class="group-sep">操作</th>';
  assetCols.forEach((c,i) => h += `<th class="grp-asset ${i===0?'group-sep':''}">${esc(c)}</th>`);
  h += '<th class="group-sep">總資產</th>';
  debtCols.forEach(c => h += `<th class="grp-debt group-sep">${esc(c)}</th>`);
  h += '<th class="group-sep">總負債</th><th>淨資產</th><th>負債比</th><th>淨資產變化</th>';
  cashCols.forEach((c,i) => h += `<th class="grp-cash ${i===0?'group-sep':''}">${esc(c)}</th>`);
  h += '<th class="group-sep">本月收入</th><th>本月支出</th><th>結餘</th>';
  h += "</tr></thead><tbody>";

  rows.forEach((r,idx) => {
    const prev = idx>0 ? rows[idx-1] : null;
    const chg = prev ? r.netWorth - prev.netWorth : null;
    h += "<tr>";
    h += `<td class="date-col">${fmtDate(r.date)}</td>`;
    h += `<td class="actions group-sep"><button class="rowbtn edit" data-id="${r.id}">編輯</button><button class="rowbtn del" data-id="${r.id}">刪除</button></td>`;
    assetCols.forEach((c,i) => { const v=r.values[c]||0; h += `<td class="${v===0?'zero':''} ${i===0?'group-sep':''}">${num(v)}</td>`; });
    h += `<td class="asset-tot group-sep">${num(r.totalAsset)}</td>`;
    debtCols.forEach(c => { const v=r.values[c]||0; h += `<td class="${v===0?'zero':''} group-sep">${num(v)}</td>`; });
    h += `<td class="debt-tot group-sep">${num(r.totalDebt)}</td>`;
    h += `<td class="net">${num(r.netWorth)}</td>`;
    h += `<td>${(r.ratio*100).toFixed(1)}%</td>`;
    h += chg==null ? '<td>—</td>' : `<td class="chg ${chg>=0?'up':'down'}">${chg>=0?'+':'−'}${num(Math.abs(chg))}</td>`;
    cashCols.forEach((c,i) => { const v=r.values[c]||0; h += `<td class="${v===0?'zero':''} ${i===0?'group-sep':''}">${num(v)}</td>`; });
    h += `<td class="asset-tot group-sep">${num(r.monthlyIncome)}</td>`;
    h += `<td class="debt-tot">${num(r.monthlyExpense)}</td>`;
    h += `<td class="chg ${r.cashBalance>=0?'up':'down'}">${num(r.cashBalance)}</td>`;
    h += "</tr>";
  });
  h += "</tbody></table>";
  $("#tableWrap").innerHTML = h;

  $("#tableWrap").onclick = async (e) => {
    const editBtn = e.target.closest(".rowbtn.edit");
    const delBtn = e.target.closest(".rowbtn.del");
    if (editBtn) {
      location.href = SHEET_URL + "?loadId=" + encodeURIComponent(editBtn.dataset.id);
      return;
    }
    if (delBtn) {
      const id = delBtn.dataset.id;
      const row = rows.find(r => r.id === id);
      if (!confirm(`確定刪除「${fmtDate(row ? row.date : "")}」這筆雲端紀錄？此動作無法復原。`)) return;
      try {
        await FS.deleteDoc(FS.doc(DB, "balanceSheets", id));
        await fetchAll(FS, DB);
      } catch (err) {
        alert("刪除失敗：" + (err.code || err.message));
      }
    }
  };
}

let trendC, ratioC;

// 依「類別名稱」加總每筆紀錄的金額；series 定義要畫的四條線
function seriesValue(r, matchCat, matchItem){
  let sum = 0;
  Object.keys(r.values).forEach(col => {
    const [cat, item] = col.split("｜");
    if (matchCat && cat !== matchCat) return;
    if (matchItem && item !== matchItem) return;
    sum += r.values[col] || 0;
  });
  return sum;
}

function renderCharts(){
  const labels = rows.map(r => fmtDate(r.date));

  // 左圖：非不動產資產（活期存款＋美股＋台股 加總）／不動產資產
  const nonRealEstate = rows.map(r => {
    let sum = 0;
    Object.keys(r.values).forEach(col => {
      const [cat] = col.split("｜");
      if (cat === "活期存款" || cat === "投資資產") sum += r.values[col] || 0;
    });
    return Math.round(sum);
  });
  const realEstate = rows.map(r => Math.round(seriesValue(r, "不動產資產", null)));
  const cash = rows.map(r => Math.round(seriesValue(r, "活期存款", null)));
  const usStock = rows.map(r => Math.round(seriesValue(r, "投資資產", "美股")));
  const twStock = rows.map(r => Math.round(seriesValue(r, "投資資產", "台股")));

  const datasets = [
    { label: "非不動產資產", data: nonRealEstate, borderColor: "#1a3a6b",
      backgroundColor: "rgba(26,58,107,.08)", fill: true, tension: .25, borderWidth: 2.5, pointRadius: 3 },
    { label: "不動產資產", data: realEstate, borderColor: "#7a4ea3",
      backgroundColor: "#7a4ea3", fill: false, tension: .25, borderWidth: 2, pointRadius: 3 },
    { label: "活期存款", data: cash, borderColor: "#1f7a5c",
      backgroundColor: "#1f7a5c", fill: false, tension: .25, borderWidth: 1.5, pointRadius: 2, borderDash: [4,3] },
    { label: "美股", data: usStock, borderColor: "#c2752a",
      backgroundColor: "#c2752a", fill: false, tension: .25, borderWidth: 1.5, pointRadius: 2, borderDash: [4,3] },
    { label: "台股", data: twStock, borderColor: "#b0413e",
      backgroundColor: "#b0413e", fill: false, tension: .25, borderWidth: 1.5, pointRadius: 2, borderDash: [4,3] },
  ];

  const baseOpts = {
    responsive: true, maintainAspectRatio: false,
    interaction: { mode: "index", intersect: false },
    plugins: {
      legend: { labels: { font: { family: "inherit" }, boxWidth: 12 } },
      tooltip: { callbacks: { label: c => `${c.dataset.label}：NT$ ${c.parsed.y.toLocaleString("en-US")}` } }
    },
    scales: { y: { ticks: { callback: v => (v/10000).toLocaleString()+"萬" } } }
  };
  if(trendC) trendC.destroy();
  trendC = new Chart($("#trendChart"), { type: "line", data: { labels, datasets }, options: baseOpts });

  // 右圖：現金流收入(綠柱)／支出(紅柱，畫在零軸下方)／結餘(金線)
  const income = rows.map(r => Math.round(r.monthlyIncome||0));
  const expenseNeg = rows.map(r => -Math.round(r.monthlyExpense||0));
  const balance = rows.map(r => Math.round(r.cashBalance||0));
  if(ratioC) ratioC.destroy();
  ratioC = new Chart($("#ratioChart"), {
    type: "bar",
    data: { labels, datasets: [
      { type:"bar", label: "本月收入", data: income, backgroundColor: "rgba(31,122,92,.55)", order: 2 },
      { type:"bar", label: "本月支出", data: expenseNeg, backgroundColor: "rgba(176,65,62,.55)", order: 2 },
      { type:"line", label: "結餘", data: balance, borderColor: "#8a6d1f", backgroundColor:"#8a6d1f",
        tension:.25, borderWidth: 2, pointRadius: 3, order: 1 },
    ]},
    options: {
      responsive:true, maintainAspectRatio:false, interaction:{mode:"index",intersect:false},
      plugins:{
        legend:{ labels:{ boxWidth:12 } },
        tooltip:{ callbacks:{ label: c => `${c.dataset.label}：NT$ ${Math.abs(c.parsed.y).toLocaleString("en-US")}` } }
      },
      scales:{
        y: { ticks:{ callback:v=>(v/10000).toLocaleString()+"萬" }, title:{display:true,text:"金額"} }
      }
    }
  });
}

function esc(s){ return String(s).replace(/</g,"&lt;").replace(/&/g,"&amp;"); }

// 匯出
function tableTSV(){
  const head = ["日期", ...assetCols, "總資產", ...debtCols, "總負債", "淨資產", "負債比%", "淨資產變化", ...cashCols, "本月收入", "本月支出", "結餘"];
  const lines = [head.join("\t")];
  rows.forEach((r,idx) => {
    const prev = idx>0?rows[idx-1]:null; const chg = prev? r.netWorth-prev.netWorth : "";
    const cells = [ r.date,
      ...assetCols.map(c => Math.round(r.values[c]||0)),
      Math.round(r.totalAsset),
      ...debtCols.map(c => Math.round(r.values[c]||0)),
      Math.round(r.totalDebt),
      Math.round(r.netWorth),
      (r.ratio*100).toFixed(1),
      chg===""?"":Math.round(chg),
      ...cashCols.map(c => Math.round(r.values[c]||0)),
      Math.round(r.monthlyIncome||0),
      Math.round(r.monthlyExpense||0),
      Math.round(r.cashBalance||0)
    ];
    lines.push(cells.join("\t"));
  });
  return lines.join("\n");
}
$("#copyTable").onclick = async () => {
  try{ await navigator.clipboard.writeText(tableTSV()); $("#copyTable").textContent="已複製！"; setTimeout(()=>$("#copyTable").textContent="複製表格（可貼到 Excel）",1500); }
  catch{ alert("複製失敗"); }
};
$("#csvBtn").onclick = () => {
  const csv = "\ufeff" + tableTSV().replace(/\t/g,",");
  const blob = new Blob([csv], {type:"text/csv;charset=utf-8"});
  const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
  a.download = "資產負債月報_"+new Date().toISOString().slice(0,10)+".csv"; a.click();
};

init();
</script>
